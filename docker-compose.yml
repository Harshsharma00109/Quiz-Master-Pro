# PATH: quiz-platform/docker-compose.yml
version: '3.9'

services:
  backend:
    build: ./backend
    container_name: quizmaster-api
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - JWT_SECRET=change_this_in_production_please
      - DB_PATH=/app/data/quiz.db
    volumes:
      - quiz_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: quizmaster-app
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: quizmaster-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  quiz_data:
